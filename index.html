<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站视频解析下载器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind CSS生产环境配置
        tailwind.config = {
            important: true,
        }
    </script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- 标题 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="fas fa-play-circle text-blue-600 mr-2"></i>
                B站视频解析下载器
            </h1>
            <p class="text-gray-600">输入B站视频链接或BV号，即可解析并下载MP4格式视频</p>
            <div class="mt-2 p-2 bg-orange-100 border border-orange-400 rounded-lg text-sm text-orange-800">
                <i class="fas fa-exclamation-triangle mr-1"></i>
                如果API访问失败，将使用模拟数据演示UI效果。部署到GitHub Pages后可正常使用
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">
                    <i class="fas fa-link mr-1"></i>视频链接或BV号
                </label>
                <div class="flex gap-2">
                    <input 
                        type="text" 
                        id="videoUrl" 
                        placeholder="输入B站视频链接（如：https://www.bilibili.com/video/BV1xx411c7mD）或BV号（如：BV1xx411c7mD）"
                        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                    <button 
                        onclick="parseVideo()" 
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors duration-200 flex items-center"
                    >
                        <i class="fas fa-search mr-2"></i>解析视频
                    </button>
                </div>
            </div>
            
            <!-- 历史记录 -->
            <div class="mt-4">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-medium text-gray-700">
                        <i class="fas fa-history mr-1"></i>历史记录
                    </label>
                    <button onclick="clearHistory()" class="text-xs text-red-600 hover:text-red-800">
                        <i class="fas fa-trash mr-1"></i>清空
                    </button>
                </div>
                <div id="historyContainer" class="max-h-32 overflow-y-auto border border-gray-200 rounded-lg p-2">
                    <p class="text-gray-500 text-sm">暂无历史记录</p>
                </div>
            </div>
        </div>

        <!-- 视频信息显示区域 -->
        <div id="videoInfo" class="bg-white rounded-lg shadow-lg p-6 mb-6 hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4">
                <i class="fas fa-info-circle text-blue-600 mr-1"></i>视频信息
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <img id="videoCover" class="w-full rounded-lg shadow-md" alt="视频封面">
                </div>
                <div>
                    <h3 id="videoTitle" class="text-lg font-semibold text-gray-800 mb-2"></h3>
                    <p id="videoDescription" class="text-gray-600 text-sm mb-2"></p>
                    <p id="videoDuration" class="text-gray-600 text-sm mb-2"></p>
                    <p id="videoUploader" class="text-gray-600 text-sm mb-2"></p>
                    <p id="videoViews" class="text-gray-600 text-sm"></p>
                </div>
            </div>
        </div>

        <!-- 进度显示区域 -->
        <div id="progressSection" class="bg-white rounded-lg shadow-lg p-6 mb-6 hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4">
                <i class="fas fa-download text-blue-600 mr-1"></i>下载进度
            </h2>
            
            <!-- 解析进度 -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-700">
                        <i class="fas fa-search mr-1"></i>解析视频
                    </span>
                    <span id="parsePercent" class="text-sm text-gray-600">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div id="parseProgress" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- 下载进度 -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-700">
                        <i class="fas fa-cloud-download-alt mr-1"></i>下载视频流
                    </span>
                    <span id="downloadPercent" class="text-sm text-gray-600">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div id="downloadProgress" class="bg-green-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- 合并进度 -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-700">
                        <i class="fas fa-compress-arrows-alt mr-1"></i>合并音视频
                    </span>
                    <span id="mergePercent" class="text-sm text-gray-600">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div id="mergeProgress" class="bg-purple-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- 状态信息 -->
            <div class="bg-gray-50 rounded-lg p-4">
                <div class="flex items-center">
                    <div id="statusIcon" class="mr-3">
                        <i class="fas fa-info-circle text-blue-500"></i>
                    </div>
                    <div>
                        <div id="statusText" class="text-sm font-medium text-gray-700">准备就绪</div>
                        <div id="statusDetail" class="text-xs text-gray-500 mt-1">等待开始下载</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 下载按钮 -->
        <div id="downloadSection" class="text-center hidden">
            <button 
                onclick="downloadVideo()" 
                class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg text-lg transition duration-200"
            >
                <i class="fas fa-download mr-2"></i>下载合并后的MP4视频
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
